<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ระบบบันทึกการบำรุงรักษารถ - เป่ากรอง อัดจาระบี เดรนน้ำถังลม">
  <title>Filter-Grease | ระบบบำรุงรักษารถ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- SheetJS for client-side Excel parsing -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<nav id="main-nav" class="hidden">
  <div class="nav-inner">
    <span class="nav-brand">
        <span class="brand-name">⚙️ Filter-Grease</span>
        <span class="brand-by">By KhunMeen</span>
      </span>
    <button class="nav-toggle" onclick="toggleMobileNav()">☰</button>
    <div class="nav-links" id="nav-links">
      <a class="nav-link" href="#dashboard">🏠 หน้าหลัก</a>
      <span class="nav-group edit-only">
        <a class="nav-link" href="#blow">💨 เป่ากรอง</a>
        <a class="nav-link" href="#grease">🔧 อัดจาระบี</a>
        <a class="nav-link" href="#drain">💧 เดรนน้ำ</a>
        <a class="nav-link" href="#followup">📞 โทรตาม</a>
      </span>
      <a class="nav-link" href="#history">📊 ประวัติ</a>
      <span class="nav-group edit-only">
        <a class="nav-link" href="#submit-report">📤 ส่งรายงาน</a>
        <a class="nav-link" href="#submit-report-grease">🔧 ส่งรายงาน-จาระบี</a>
        <a class="nav-link" href="#report-history">📋 ประวัติรายงาน</a>
        <a class="nav-link" href="#violations">⚠️ มาตรการ</a>
      </span>
      <a class="nav-link" href="#standards">📋 มาตรฐาน</a>
      <a class="nav-link admin-only" href="#import">📥 Import Excel</a>
      <a class="nav-link admin-only" href="#admin" id="nav-admin">👤 Admin</a>
    </div>
    <div class="nav-user-area">
      <span id="nav-user" class="nav-username"></span>
      <button class="btn-logout" onclick="APP.logout(); window.location.hash='#login'">ออก</button>
    </div>
  </div>
</nav>

<main id="app-container">
  <div class="loading"><div class="spinner"></div><p>กำลังโหลด...</p></div>
</main>

<script src="api.js"></script>
<script src="app.js"></script>

<script>
const VIEW_SCRIPTS = {
  '#login':                'views/login.js',
  '#dashboard':            'views/dashboard.js',
  '#blow':                 'views/blowing.js',
  '#grease':               'views/greasing.js',
  '#drain':                'views/drain.js',
  '#entry-form':           'views/entry-form.js',
  '#followup':             'views/followup.js',
  '#submit-report':        'views/submit-report.js',
  '#submit-report-grease': 'views/submit-report-grease.js',
  '#report-history':       'views/report-history.js',
  '#history':              'views/report.js',
  '#violations':           'views/violations.js',
  '#standards':            'views/standards.js',
  '#admin':                'views/admin.js',
  '#import':               'views/import.js',
};

// Routes only viewer can access
const VIEWER_ROUTES = new Set(['#login','#dashboard','#history','#standards','#report-history']);

const loadedScripts = {};

const PRELOAD_DEPS = {
  '#blow':  ['views/entry-form.js', 'views/greasing.js'],
  '#drain': ['views/entry-form.js'],
  '#grease': ['views/greasing.js'],
};

async function loadScript(src) {
  if (loadedScripts[src]) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src + '?v=5';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  loadedScripts[src] = true;
}

async function loadView(hash) {
  const src = VIEW_SCRIPTS[hash];
  if (!src) return null;
  // Preload dependencies first
  const deps = PRELOAD_DEPS[hash] || [];
  for (const dep of deps) { await loadScript(dep); }
  await loadScript(src);
  const key = 'VIEW_' + hash.replace('#','').replace(/-/g,'_').toUpperCase();
  return window[key];
}

function updateNav() {
  const user = APP.getUserInfo();
  const nav = document.getElementById('main-nav');
  if (!user) { nav.classList.add('hidden'); return; }
  nav.classList.remove('hidden');
  document.getElementById('nav-user').textContent = user.display_name;

  const isViewer = user.role === 'viewer';
  const isAdmin = user.role === 'admin';

  document.querySelectorAll('.edit-only').forEach(el => {
    el.style.display = isViewer ? 'none' : '';
  });
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = isAdmin ? '' : 'none';
  });
}

function toggleMobileNav() {
  document.getElementById('nav-links').classList.toggle('open');
}

async function navigate() {
  const hash = window.location.hash || '#dashboard';
  const container = document.getElementById('app-container');

  if (hash !== '#login' && !APP.isLoggedIn()) {
    window.location.hash = '#login'; return;
  }
  if (hash === '#login' && APP.isLoggedIn()) {
    window.location.hash = '#dashboard'; return;
  }

  // Viewer role restriction
  if (APP.isViewerOnly && APP.isViewerOnly() && !VIEWER_ROUTES.has(hash)) {
    window.location.hash = '#dashboard'; return;
  }

  updateNav();

  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === hash);
  });
  // Close mobile nav
  document.getElementById('nav-links') && document.getElementById('nav-links').classList.remove('open');

  APP.showLoading(container);

  try {
    const renderFn = await loadView(hash);
    if (renderFn) renderFn(container);
    else container.innerHTML = '<div class="alert alert-danger">ไม่พบหน้านี้</div>';
  } catch (e) {
    APP.showError(container, `เกิดข้อผิดพลาด: ${e.message}`);
    console.error(e);
  }
}

window.addEventListener('hashchange', navigate);
window.addEventListener('load', navigate);
</script>
</body>
</html>
